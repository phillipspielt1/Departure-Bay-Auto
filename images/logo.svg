<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 165" width="320" height="165">
  <defs>
    <path id="arc" d="M 18,90 Q 160,6 302,90" fill="none"/>
  </defs>

  <!-- DEPARTURE BAY arced text -->
  <text font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1a1a1a" letter-spacing="4">
    <textPath href="#arc" startOffset="50%" text-anchor="middle">DEPARTURE BAY</textPath>
  </text>

  <!-- Car silhouette - line art -->
  <g stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Upper body profile: front bumper → hood → windshield → roofline → rear window → trunk → rear -->
    <path d="M 32,90 Q 36,80 52,75 L 90,67 Q 98,62 107,59 Q 116,46 130,44 L 194,43 Q 214,43 226,59 L 232,70 Q 244,73 270,75 Q 281,80 288,92 L 290,104"/>

    <!-- Front face -->
    <line x1="32" y1="90" x2="32" y2="104"/>

    <!-- Lower body with wheel arches -->
    <path d="M 32,104 L 84,104 Q 84,88 100,88 Q 116,88 116,104 L 216,104 Q 216,88 232,88 Q 248,88 248,104 L 290,104"/>

    <!-- Beltline (bottom of glass) -->
    <line x1="107" y1="70" x2="218" y2="70"/>

    <!-- B-pillar -->
    <line x1="157" y1="44" x2="157" y2="70"/>

    <!-- Hood character line -->
    <path d="M 52,78 Q 90,72 107,67"/>

    <!-- Lower body crease -->
    <path d="M 52,96 Q 160,94 248,96"/>

    <!-- Headlight -->
    <path d="M 34,88 L 38,78 L 64,74 L 64,80 L 40,85 Z"/>

  </g>

  <!-- Front wheel -->
  <circle cx="100" cy="112" r="14" fill="white" stroke="#1a1a1a" stroke-width="2.2"/>
  <circle cx="100" cy="112" r="5" fill="#1a1a1a"/>

  <!-- Rear wheel -->
  <circle cx="232" cy="112" r="14" fill="white" stroke="#1a1a1a" stroke-width="2.2"/>
  <circle cx="232" cy="112" r="5" fill="#1a1a1a"/>

  <!-- AUTOMOTIVE -->
  <text x="160" y="142"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="30" font-weight="900"
        text-anchor="middle" fill="#1a1a1a" letter-spacing="2">AUTOMOTIVE</text>

  <!-- SERVICE CENTRE -->
  <text x="160" y="158"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10" font-weight="600"
        text-anchor="middle" fill="#1a1a1a" letter-spacing="7">SERVICE CENTRE</text>
</svg>
