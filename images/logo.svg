<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <defs>
    <path id="arc" d="M 30,90 Q 150,10 270,90" fill="none"/>
  </defs>

  <!-- "DEPARTURE BAY" arced text -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1a1a1a" letter-spacing="3">
    <textPath href="#arc" startOffset="50%" text-anchor="middle">DEPARTURE BAY</textPath>
  </text>

  <!-- Car silhouette (simple line drawing) -->
  <g stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body / roofline -->
    <path d="M 55,80 L 75,80 L 90,62 Q 100,55 115,54 L 190,54 Q 205,55 215,62 L 228,80 L 248,80"/>
    <!-- Lower body line -->
    <path d="M 55,80 L 55,92 L 248,92 L 248,80"/>
    <!-- Windows divider -->
    <line x1="152" y1="54" x2="152" y2="80"/>
    <!-- Left wheel -->
    <circle cx="90" cy="95" r="9" fill="#fff"/>
    <circle cx="90" cy="95" r="4" fill="#1a1a1a"/>
    <!-- Right wheel -->
    <circle cx="215" cy="95" r="9" fill="#fff"/>
    <circle cx="215" cy="95" r="4" fill="#1a1a1a"/>
  </g>

  <!-- "AUTOMOTIVE" big chunky text -->
  <text x="150" y="122" font-family="Impact, 'Arial Black', sans-serif" font-size="28" font-weight="900"
        text-anchor="middle" fill="#1a1a1a" letter-spacing="2">AUTOMOTIVE</text>

  <!-- "SERVICE CENTRE" thin text -->
  <text x="150" y="138" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="500"
        text-anchor="middle" fill="#1a1a1a" letter-spacing="6">SERVICE CENTRE</text>
</svg>
