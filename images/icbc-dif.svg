<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 84" width="270" height="84">
  <defs>
    <clipPath id="shieldClip">
      <path d="M 10,16 L 58,16 L 58,54 Q 34,70 10,54 Z"/>
    </clipPath>
  </defs>

  <!-- Outer border -->
  <rect x="0.75" y="0.75" width="268.5" height="82.5" fill="white" stroke="#002D7F" stroke-width="1.5" rx="2"/>

  <!-- Left section background -->
  <rect x="3" y="3" width="66" height="78" fill="#f0f4fb" rx="1"/>

  <!-- Crown above shield -->
  <path d="M 15,16 L 15,9 L 21,13 L 27,8 L 34,12 L 41,8 L 47,13 L 53,9 L 53,16 Z"
        fill="#002D7F"/>
  <rect x="15" y="14" width="38" height="3" fill="#002D7F"/>

  <!-- Shield (BC arms silhouette) -->
  <!-- UJ top portion -->
  <rect x="10" y="16" width="48" height="22" fill="#002D7F" clip-path="url(#shieldClip)"/>
  <line x1="10" y1="16" x2="58" y2="38" stroke="white" stroke-width="5" clip-path="url(#shieldClip)"/>
  <line x1="58" y1="16" x2="10" y2="38" stroke="white" stroke-width="5" clip-path="url(#shieldClip)"/>
  <line x1="34" y1="16" x2="34" y2="38" stroke="white" stroke-width="7" clip-path="url(#shieldClip)"/>
  <line x1="10" y1="27" x2="58" y2="27" stroke="white" stroke-width="7" clip-path="url(#shieldClip)"/>
  <line x1="34" y1="16" x2="34" y2="38" stroke="#CF142B" stroke-width="4" clip-path="url(#shieldClip)"/>
  <line x1="10" y1="27" x2="58" y2="27" stroke="#CF142B" stroke-width="4" clip-path="url(#shieldClip)"/>
  <!-- Gold bottom with waves -->
  <rect x="10" y="38" width="48" height="32" fill="#F7C600" clip-path="url(#shieldClip)"/>
  <path d="M 10,44 Q 22,40 34,44 Q 46,48 58,44 L 58,50 Q 46,54 34,50 Q 22,46 10,50 Z"
        fill="#002D7F" clip-path="url(#shieldClip)"/>
  <path d="M 10,56 Q 22,52 34,56 Q 46,60 58,56 L 58,62 Q 46,66 34,62 Q 22,58 10,62 Z"
        fill="#002D7F" clip-path="url(#shieldClip)"/>
  <!-- Shield outline -->
  <path d="M 10,16 L 58,16 L 58,54 Q 34,70 10,54 Z" fill="none" stroke="#002D7F" stroke-width="1.5"/>

  <!-- ICBC label -->
  <text x="34" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="700"
        fill="#002D7F" letter-spacing="1">ICBC</text>

  <!-- Vertical divider -->
  <line x1="72" y1="6" x2="72" y2="78" stroke="#002D7F" stroke-width="0.75" opacity="0.3"/>

  <!-- Center: main text -->
  <text x="162" y="27" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
        font-size="13.5" font-weight="900" fill="#002D7F" letter-spacing="1.5">DESIGNATED</text>
  <text x="162" y="46" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
        font-size="13.5" font-weight="900" fill="#002D7F" letter-spacing="1.5">INSPECTION</text>
  <text x="162" y="65" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
        font-size="13.5" font-weight="900" fill="#002D7F" letter-spacing="1.5">FACILITY</text>
  <text x="162" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="6"
        fill="#002D7F" letter-spacing="0.4" opacity="0.6">INSURANCE CORPORATION OF BRITISH COLUMBIA</text>

  <!-- Vertical divider right -->
  <line x1="222" y1="6" x2="222" y2="78" stroke="#002D7F" stroke-width="0.75" opacity="0.3"/>

  <!-- Right: BC Flag -->
  <rect x="225" y="10" width="40" height="64" fill="#002D7F" rx="1"/>
  <!-- Top half UJ -->
  <rect x="225" y="10" width="40" height="28" fill="#002D7F"/>
  <line x1="225" y1="10" x2="265" y2="38" stroke="white" stroke-width="4"/>
  <line x1="265" y1="10" x2="225" y2="38" stroke="white" stroke-width="4"/>
  <line x1="245" y1="10" x2="245" y2="38" stroke="white" stroke-width="5.5"/>
  <line x1="225" y1="24" x2="265" y2="24" stroke="white" stroke-width="5.5"/>
  <line x1="245" y1="10" x2="245" y2="38" stroke="#CF142B" stroke-width="3"/>
  <line x1="225" y1="24" x2="265" y2="24" stroke="#CF142B" stroke-width="3"/>
  <!-- Bottom half gold + waves -->
  <rect x="225" y="38" width="40" height="36" fill="#F7C600"/>
  <path d="M 225,44 Q 235,40 245,44 Q 255,48 265,44 L 265,50 Q 255,54 245,50 Q 235,46 225,50 Z" fill="#002D7F"/>
  <path d="M 225,56 Q 235,52 245,56 Q 255,60 265,56 L 265,62 Q 255,66 245,62 Q 235,58 225,62 Z" fill="#002D7F"/>
  <!-- Setting sun (right-side arc) -->
  <path d="M 265,74 L 248,74 Q 264,56 265,38 Z" fill="rgba(0,45,127,0.25)"/>
  <!-- Flag border -->
  <rect x="225" y="10" width="40" height="64" fill="none" stroke="#002D7F" stroke-width="1"/>
</svg>
